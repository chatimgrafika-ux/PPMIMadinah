<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header PPMI Madinah</title>
    <!-- Mengimpor font dari Google Fonts untuk teks Arab dan Latin -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Pengaturan dasar agar pas di Google Sites */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Poppins', sans-serif;
            /* overflow: hidden; dihapus agar form embed yang panjang ke bawah tidak terpotong */
            overflow-x: hidden; /* Hanya mencegah scroll menyamping */
        }

        /* Wrapper baru untuk menyatukan banner dan teks bergerak */
        .header-wrapper {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: transparent;
        }

        /* Desain utama banner header - Dibuat sangat fleksibel */
        .header-banner {
            position: relative;
            width: 100%;
            background: linear-gradient(135deg, #0f7b40 0%, #159c52 50%, #0a572c 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
            padding: 15px 5%;
            box-sizing: border-box;
            overflow: hidden;
            gap: 15px;
        }

        /* Efek cahaya/motif abstrak tipis di background */
        .header-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 150%, rgba(255, 255, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% -30%, rgba(255, 255, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }

        /* Wadah untuk teks */
        .text-container {
            z-index: 1;
            text-align: right;
            color: #ffffff;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Styling font Arab dengan ukuran responsif (clamp) */
        .text-container h1 {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            font-size: clamp(1.5rem, 5vw, 2.8rem); 
            font-weight: 700;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            line-height: 1.2;
        }

        /* Styling subtitle dengan ukuran responsif */
        .text-container p {
            margin: 5px 0 0 0;
            font-size: clamp(0.8rem, 2.5vw, 1.3rem);
            letter-spacing: 1px;
            font-weight: 700;
            color: #d1f2df;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* Wadah untuk logo */
        .logo-container {
            z-index: 1;
            flex-shrink: 0;
        }

        /* Desain bentuk logo (Dibuat bulat dengan border dan ukuran responsif) */
        .logo-container img {
            height: clamp(60px, 15vw, 110px);
            width: clamp(60px, 15vw, 110px);
            object-fit: contain;
            background-color: #ffffff;
            border-radius: 50%;
            padding: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
            border: 3px solid #b3e6c9;
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        /* --- Desain Tulisan Bergerak (Ticker) --- */
        .ticker-container {
            width: 100%;
            background-color: #084c25;
            padding: 8px 0;
            overflow: hidden;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            color: #d1f2df;
            font-size: 0.95rem;
            font-family: 'Cairo', 'Poppins', sans-serif;
            padding-left: 100%;
            animation: scroll 20s linear infinite;
        }

        .ticker-text:hover {
            animation-play-state: paused;
            cursor: default;
        }

        .ticker-text span {
            margin-right: 10px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* --- Desain Embed Form AppScript --- */
        .appscript-embed-wrapper {
            margin: 25px auto 10px auto;
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border-top: 4px solid #159c52;
            overflow: hidden;
            direction: ltr;
        }

        .appscript-embed-wrapper iframe {
            width: 100%;
            height: 700px; /* Tinggi default untuk PC */
            border: none;
            display: block;
        }

        /* =========================================================
           OPTIMALISASI KHUSUS HP (TAMPILAN MOBILE-FRIENDLY)
           ========================================================= */
        @media (max-width: 600px) {
            .header-banner {
                /* Mengubah susunan menjadi Atas-Bawah (Kolom) */
                flex-direction: column-reverse; 
                text-align: center;
                padding: 20px 15px;
                gap: 10px;
            }
            .text-container {
                text-align: center;
                align-items: center;
            }
            .text-container h1 {
                font-size: 1.8rem; /* Ukuran pas agar tidak kepotong di HP */
                line-height: 1.3;
            }
            .text-container p {
                margin-top: 5px;
                font-size: 1rem;
            }
            .logo-container img {
                height: 80px; /* Ukuran tetap untuk logo di HP */
                width: 80px;
                margin-bottom: 5px; /* Jarak antara logo dan teks */
            }
            .ticker-container {
                padding: 6px 0;
            }
            .ticker-text {
                font-size: 0.85rem;
            }
            .appscript-embed-wrapper {
                margin: 15px 0 10px 0; /* Menghilangkan margin kiri-kanan agar lebar penuh */
                border-radius: 8px; /* Lengkungan sedikit lebih kotak */
                border-top: 3px solid #159c52;
            }
            .appscript-embed-wrapper iframe {
                height: 1100px; /* Tinggi ekstra besar di HP agar form tidak double-scroll */
            }
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <div class="header-banner">
            <!-- Bagian Teks -->
            <div class="text-container">
                <h1>المندوبية الإندونيسية</h1>
                <p>PPMI MADINAH</p>
            </div>
            <!-- Bagian Logo -->
            <div class="logo-container">
                <img src="https://drive.google.com/thumbnail?id=1RIT1Gm7ICdsZruNqS0EpEK2J3PIYws5E" alt="Logo PPMI Madinah" onerror="this.src='https://via.placeholder.com/110/ffffff/0f7b40?text=Logo'">
            </div>
        </div>
        
        <!-- Bagian Tulisan Bergerak (Ticker) -->
        <div class="ticker-container" dir="ltr">
            <div class="ticker-text">
                <span>أهلاً بكم في الموقع المصغر الداخلي للمندوبية الإندونيسية • Selamat datang di microsite internal PPMI Madinah •</span>
            </div>
        </div>
    </div>

<!DOCTYPE html>
<html lang="id">
<head>

            padding: 0; 
            background-color: transparent; 
            font-family: 'Poppins', sans-serif;

        .action-btn {

            font-weight: 600;

            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease; 
            text-align: center;

            max-width: 400px;
            border: none;
            cursor: pointer;
            display: block;
        }

        .action-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2); 
            filter: brightness(1.1);
        }

        @media (max-width: 480px) { 
            .action-btn { 
                font-size: 0.85rem;
                padding: 10px;
            } 
        }
    </style>
</head>
<body>
    <div class="button-container">
        <a href="https://script.google.com/macros/s/AKfycbzSClSe7aQsSCh_44jC-zx9rhN5Ya2Hs4kC5_B4d3QrRjIpP_RtKLM1-WQD9vgUOfGb/exec" target="_blank" class="action-btn">Pendataan UIM-KJRI-VISA 2026</a>
    </div>
</body>
</html>
